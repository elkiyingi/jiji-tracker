name: Jiji Deal Scraper

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Jiji.ug
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4 lxml supabase

      - name: Install Playwright Chromium + deps
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      # ── Upload the debug HTML files so we can inspect what Jiji returned ──
      - name: Upload debug HTML artifacts
        if: always()   # upload even if scraper step fails
        uses: actions/upload-artifact@v4
        with:
          name: jiji-debug-html-${{ github.run_id }}
          path: /tmp/jiji_debug/
          retention-days: 3
