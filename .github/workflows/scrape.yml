name: Jiji Deal Scraper

on:
  schedule:
    - cron: "0 9 * * *"   # daily at 9am UTC
  workflow_dispatch:

jobs:
  scrape:
    name: Scrape Jiji.ug
    runs-on: ubuntu-latest
    timeout-minutes: 45      # increased from 25 — concurrent enrichment ~8-12 min

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: info
          LOG_HTML: false
          CAPTCHA_SOLVER: none
        options: >-
          --health-cmd "curl -sf http://localhost:8191/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
          --health-start-period 20s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 lxml supabase

      - name: Run scraper
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          FLARESOLVERR_URL:  http://localhost:8191/v1
        run: python scraper.py
